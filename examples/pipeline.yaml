name: track_criminals

connectors:
  kafka:
    brokers: ["redpanda:9092"]
    schema_registry: "http://redpanda:8081"
    consumer_group: "intake-service"

  s3:
    endpoint: "http://minio:9000"
    access_key: "minioadmin"
    secret_key: "minioadmin"
    region: "us-east-1"
    bucket_notifications: "s3-bucket-notifications"

  postgres:
    database: "galadril_dev"
    host: "postgres:5432"
    user: "postgres"
    password: "postgres"

sources:
  - id: image_source
    topic: raw
    match_pattern: "^images/"
    schema_path: schemas/avro/satellite.avsc

  - id: transaction_source
    topic: raw
    match_pattern: "^transactions/"
    schema_path: schemas/avro/transaction.avsc

pipeline:
  - step: inference_face
    type: inference
    input_from: [image_source]
    model: galadril_inference.models.face_recognition.FaceRecognitionModel
    artifact_path: /models/insightface/buffalo_l
    params:
      action: embed

  - step: resolve_people
    type: resolve
    input_from: [inference_face]
    params:
      modality: face
      threshold: 0.85
      entity_type: PERSON

  - step: sink_people
    type: sink
    connector: postgres
    input_from: [resolve_people]
    params:
      entity_type: PERSON
      modality: face

  - step: causal_people_state_confidence
    type: causal
    input_from: [sink_people]
    params:
      trigger: cron
      cron: "0 * * * *"  # hourly

      # Targets are entity-scoped neighborhoods.
      targets:
        - "entity:person_123"
        - "entity:person_456"

      lookback: "14d"
      bucket: "1h"
      k_min: 1
      k_max: 3
      max_vertices: 800
      include_presence_links: true

      max_events: 100000
      max_states: 100000

      amarth_target_outcome: "state_avg_confidence.sighting"
      amarth_window_size: "14D"

      # Planned metric evolution: add more columns derived from state_value.
      state_metrics:
        - metric_id: "state_avg_confidence"
          expr_sql: "(state_value->>'confidence')::double precision"
          agg_sql: "AVG"
        - metric_id: "state_count"
          expr_sql: "1::double precision"
          agg_sql: "COUNT"
        - metric_id: "state_avg_bbox_area"
          expr_sql: "((state_value->'bbox'->>2)::double precision) * ((state_value->'bbox'->>3)::double precision)"
          agg_sql: "AVG"
